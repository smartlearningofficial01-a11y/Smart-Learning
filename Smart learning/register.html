<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="css/style.css">

<meta charset="UTF-8">
<title>Smart Learning - Student Registration</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
text-align:center;
padding:40px;
}

h2{
color:#0b2a4a;
}

form{
background:white;
padding:30px;
width:320px;
margin:auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:orange;
color:white;
padding:12px;
border:none;
border-radius:5px;
cursor:pointer;
width:95%;
font-size:16px;
}

button:hover{
background:#ff8c00;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<body>

<h2>Student Registration</h2>

<form id="registerForm">

<input type="text" id="student" placeholder="Student Name" required>

<input type="text" id="parent" placeholder="Parent Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="text" id="country" placeholder="Country">

<input type="text" id="subject" placeholder="Subject">

<input type="text" id="grade" placeholder="Grade">

<button type="submit">Register</button>

</form>


<!-- Supabase Library -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = "https://zioklpwtkjxnvfxvtoti.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inppb2tscHd0a2p4bnZmeHZ0b3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDk5NzUsImV4cCI6MjA4ODcyNTk3NX0.PYbHIEIejaWBxCzKNqD2tVJuUND5jNIPHiqfdbtQgxo"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)


document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault()

const student = document.getElementById("student").value
const parent = document.getElementById("parent").value
const email = document.getElementById("email").value
const country = document.getElementById("country").value
const subject = document.getElementById("subject").value
const grade = document.getElementById("grade").value


const { data, error } = await supabaseClient
.from('Student')
.insert([
{
student_name: student,
parent_name: parent,
email: email,
country: country,
subject: subject,
grade: grade
}
])


if(error){

console.log(error)
alert("Error saving data: " + error.message)

}else{

alert("Registration Successful!")

document.getElementById("registerForm").reset()

}

})

</script>
<script src="js/app.js"></script>
</body>

</html>
<form id="registerForm">

<input type="text" id="student" placeholder="Student Name" required>

<input type="text" id="parent" placeholder="Parent Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="text" id="subject" placeholder="Subject" required>

<input type="text" id="grade" placeholder="Grade" required>

<input type="text" id="country" placeholder="Country" required>

<button type="submit">Register</button>

</form>
