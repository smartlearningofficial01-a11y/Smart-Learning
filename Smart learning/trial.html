<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="css/style.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMART LEARNING | Book Free Trial</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f6ff;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
width:380px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

h2{
color:#0b2a4a;
margin-bottom:20px;
}

input, select{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:orange;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ff8c00;
}

.success{
color:green;
margin-top:15px;
font-weight:bold;
}

.error{
color:red;
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Book Free Trial Class</h2>

<form id="bookingForm">

<input type="text" id="student" placeholder="Student Name" required>

<select id="subject" required>
<option value="">Select Subject</option>
<option value="Mathematics">Mathematics</option>
<option value="English">English</option>
<option value="Science">Science</option>
<option value="Computer Science">Computer Science</option>
</select>

<select id="tutor" required>
<option value="">Select Tutor</option>
<option value="Mr John">Mr John</option>
<option value="Ms Sarah">Ms Sarah</option>
<option value="Mr David">Mr David</option>
</select>

<input type="date" id="date" required>

<input type="time" id="time" required>

<button type="submit">Book Trial Class</button>

</form>

<div id="message"></div>

</div>


<!-- Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://zioklpwtkjxnvfxvtoti.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inppb2tscHd0a2p4bnZmeHZ0b3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDk5NzUsImV4cCI6MjA4ODcyNTk3NX0.PYbHIEIejaWBxCzKNqD2tVJuUND5jNIPHiqfdbtQgxo"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)


const form = document.getElementById("bookingForm")
const message = document.getElementById("message")


form.addEventListener("submit", async (e)=>{

e.preventDefault()

message.innerHTML = ""

const student = document.getElementById("student").value
const subject = document.getElementById("subject").value
const tutor = document.getElementById("tutor").value
const date = document.getElementById("date").value
const time = document.getElementById("time").value

console.log(student, subject, tutor, date, time)


const { data, error } = await supabaseClient
.from("Bookings")
.insert([
{
student_name: student,
subject: subject,
tutor: tutor,
class_date: date,
class_time: time
}
])


if(error){

console.error(error)

message.innerHTML = "<div class='error'>Error booking class. Check console.</div>"

}else{

message.innerHTML = "<div class='success'>Trial Class Booked Successfully!</div>"

form.reset()

console.log("Booking saved:", data)

}

})

</script>
<script src="js/app.js"></script>
</body>

</html>
<h2>Book a Class</h2>

<form id="bookingForm">

<input type="text" id="student" placeholder="Student Name" required>

<input type="text" id="subject" placeholder="Subject" required>

<input type="text" id="tutor" placeholder="Tutor Name" required>

<input type="date" id="date" required>

<input type="time" id="time" required>

<button type="submit">Book Class</button>

</form>

<script src="js/app.js"></script>
