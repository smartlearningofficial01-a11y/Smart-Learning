<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="css/style.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Learning | Student Login</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0b2a4a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
width:380px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#0b2a4a;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:orange;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff8c00;
}

.message{
margin-top:15px;
font-weight:bold;
}

.error{
color:red;
}

.success{
color:green;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Login</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button id="loginBtn" onclick="login()">Login</button>

<div id="msg" class="message"></div>

<p style="margin-top:15px;">
Don't have an account? 
<a href="signup.html">Sign Up</a>
</p>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://zioklpwtkjxnvfxvtoti.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inppb2tscHd0a2p4bnZmeHZ0b3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDk5NzUsImV4cCI6MjA4ODcyNTk3NX0.PYbHIEIejaWBxCzKNqD2tVJuUND5jNIPHiqfdbtQgxo"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

async function login(){

const btn = document.getElementById("loginBtn")
const msg = document.getElementById("msg")

btn.disabled = true
btn.innerText = "Logging in..."

msg.innerHTML=""

const email = document.getElementById("email").value
const password = document.getElementById("password").value

if(email=="" || password==""){

msg.innerHTML="<span class='error'>Please enter email and password</span>"

btn.disabled=false
btn.innerText="Login"

return

}

const { data, error } = await supabaseClient.auth.signInWithPassword({

email: email,
password: password

})

if(error){

msg.innerHTML="<span class='error'>"+error.message+"</span>"

btn.disabled=false
btn.innerText="Login"

}else{

msg.innerHTML="<span class='success'>Login successful! Redirecting...</span>"

setTimeout(()=>{

window.location="dashboard.html"

},1500)

}

}

</script>
<script src="js/app.js"></script>
</body>

</html>
